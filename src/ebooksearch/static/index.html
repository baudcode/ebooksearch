<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ebooksearch</title>
    <link rel="stylesheet" href="/styles.css">
    <script>
        // Apply the saved theme before first paint to avoid a flash.
        (function () {
            try {
                if (localStorage.getItem("theme") === "dark") {
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            } catch (e) { /* localStorage unavailable */ }
        })();
    </script>
</head>
<body>
    <main>
        <header class="page-head">
            <h1>ebooksearch</h1>
            <div class="stats" id="stats">
                <span data-k="total">— books</span>
                <span data-k="dbsize">— DB</span>
                <span data-k="lastrun" title="">last reindex —</span>
            </div>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
        </header>

        <div class="search-wrap">
            <input
                id="q"
                type="search"
                placeholder="Search title, author, filename…"
                autocomplete="off"
                autofocus>
        </div>

        <section id="results-section">
            <h2 id="results-title">Recently indexed</h2>
            <ul id="results" class="accordion"></ul>
            <div id="empty" class="empty hidden">No matches.</div>
        </section>
    </main>

    <footer class="statusbar" aria-live="polite">
        <button id="reindex" type="button">Reindex</button>
        <span class="phase" id="phase">idle</span>
        <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
        <span class="summary" id="summary"></span>
        <details id="errors-wrap" class="hidden">
            <summary><span id="err-count">0</span> err</summary>
            <ul id="errors"></ul>
            <button type="button" id="view-all-errors" class="link-button">View full list</button>
        </details>
    </footer>

    <div id="errors-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="errors-modal-title">
        <div class="modal-backdrop" data-close></div>
        <div class="modal-panel">
            <header class="modal-head">
                <h2 id="errors-modal-title">All errors for last run</h2>
                <button type="button" class="modal-close" data-close aria-label="Close">×</button>
            </header>
            <div class="modal-meta" id="errors-modal-meta">—</div>
            <ul id="errors-modal-list" class="errors-list"></ul>
            <div id="errors-modal-loadmore-wrap" class="hidden">
                <button type="button" id="errors-modal-loadmore" class="modal-loadmore">Load more</button>
            </div>
        </div>
    </div>

    <script src="/app.js" type="module"></script>
</body>
</html>
