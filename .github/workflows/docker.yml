name: Build and push Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # required to push to ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        # qemu is needed so the runner (amd64) can also build arm64.

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single source of truth for the version: pyproject.toml.
      - id: version
        run: |
          v=$(awk -F'"' '/^version *= */ {print $2; exit}' pyproject.toml)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building version: $v"

      # Tags produced on every push to main:
      #   :X.Y.Z, :vX.Y.Z   ← from pyproject.toml
      #   :latest
      #   :main
      #   :sha-<short>      ← always unique, useful for traceability
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ebooksearch
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=latest
            type=ref,event=branch
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
